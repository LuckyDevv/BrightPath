<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Подтверждение входа - Светлый Путь</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="../logo.png" type="image/png">
</head>
<body>
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="../logo.png" alt="Светлый Путь" class="login-logo">
                </div>
                <h1>Двухфакторная аутентификация</h1>
                <p class="subtitle">Введите код из приложения-аутентификатора</p>
            </div>

            <div class="verify-content">
                <div class="auth-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d4a373" stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor"/>
                        <circle cx="12" cy="16" r="1.5" fill="#d4a373"/>
                    </svg>
                </div>

                <div class="code-input-wrapper">
                    <label>Код подтверждения</label>
                    <div class="code-inputs">
                        <input type="text" maxlength="1" class="code-digit" data-index="0">
                        <input type="text" maxlength="1" class="code-digit" data-index="1">
                        <input type="text" maxlength="1" class="code-digit" data-index="2">
                        <input type="text" maxlength="1" class="code-digit" data-index="3">
                        <input type="text" maxlength="1" class="code-digit" data-index="4">
                        <input type="text" maxlength="1" class="code-digit" data-index="5">
                    </div>
                </div>

                <div class="verify-actions">
                    <button class="btn-verify" id="verifyBtn">Войти</button>
                    <button class="btn-back" id="backBtn">← Вернуться</button>
                </div>

                <div class="verify-footer">
                    <p class="info-text">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10" stroke="currentColor"/>
                            <path d="M12 8v4M12 16h.01" stroke="currentColor"/>
                        </svg>
                        Откройте приложение-аутентификатор на вашем телефоне
                    </p>
                    <a href="#" class="recovery-link">Не получается войти? Восстановить доступ</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Фокус на первом поле
    document.querySelector('.code-digit')?.focus();

    // Автоматическое переключение между полями
    const digits = document.querySelectorAll('.code-digit');

    digits.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < digits.length - 1) {
                digits[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && index > 0 && !e.target.value) {
                digits[index - 1].focus();
            }
        });

        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const paste = e.clipboardData.getData('text');
            if (paste.length === 6 && /^\d+$/.test(paste)) {
                paste.split('').forEach((char, i) => {
                    if (digits[i]) digits[i].value = char;
                });
                digits[5].focus();
            }
        });
    });

    // Проверка кода
    document.getElementById('verifyBtn')?.addEventListener('click', () => {
        let code = '';
        digits.forEach(input => {
            code += input.value;
        });

        if (code.length === 6) {
            alert('Код принят! Выполняется вход...');
            window.location.href = 'index.html';
        } else {
            alert('Введите 6-значный код');
        }
    });

    // Кнопка назад
    document.getElementById('backBtn')?.addEventListener('click', () => {
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
